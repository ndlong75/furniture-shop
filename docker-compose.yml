version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fs_postgres
    environment:
      POSTGRES_DB: furnituredb
      POSTGRES_USER: furnitureuser
      POSTGRES_PASSWORD: furniturepass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furnitureuser -d furnituredb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: builder
    container_name: fs_backend
    command: ["npm", "run", "dev"]
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://furnitureuser:furniturepass@postgres:5432/furnituredb
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:4200
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./database:/app/database
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: fs_frontend
    working_dir: /app
    command: ["npm", "start", "--", "--host", "0.0.0.0"]
    environment:
      - NODE_ENV=development
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
